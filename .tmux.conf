# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'omerxx/tmux-floax'

set -g @continuum-restore 'on'
set -g @resurrect-capture-pane-contents 'on'
set -g @floax-bind 't'

set -g base-index 1
set -g status-position top
set -g detach-on-destroy off
set -g escape-time 0
set -g history-limit 100000
set -g renumber-windows on
set -g set-clipboard on 
setw -g mode-keys vi
set -g mouse on
set -g prefix C-a
set -g prefix2 C-Space
unbind C-b
set -g pane-border-lines heavy
set -g status-left ""
set -g status-left-length 0
set -g set-clipboard on
set -g allow-passthrough on
set -g extended-keys on
set -g extended-keys-format csi-u
bind-key x kill-pane # skip "kill-pane 1? (y/n)" prompt
set -g detach-on-destroy off  # don't exit from tmux when closing a session

# New windows and splits open in cwd
bind c new-window -c "#{pane_current_path}"
bind-key '\' split-window -h -c "#{pane_current_path}"
bind-key '-' split-window -v -c "#{pane_current_path}"

# Status bar styles
set -g status-style "bg=#A3BE8C,fg=#2E3440"
setw -g window-status-format "#[bg=#A3BE8C,fg=#4C566A] #I:#W#{window_flags} #[default]"
# Pane focus
set -g pane-border-style "fg=#4C566A"
set -g pane-active-border-style "fg=#A3BE8C"

# Show a small label in the pane border
set -g pane-border-status top
set -g pane-border-format "#{?pane_active,#[fg=#2E3440,bg=#A3BE8C,bold] #[default] #[fg=#A3BE8C,bold]#P #[fg=#88C0D0]#{b:pane_current_path} ,#[fg=#4C566A]#P }"
setw -g window-status-format "#[fg=#4C566A] #I:#W#{window_flags} "
setw -g window-status-current-style "reverse,bold"
setw -g window-status-current-format " #I:#W#{window_flags} "
# Slightly dim inactive panes
set -g window-style "bg=#2A2F3A"
set -g window-active-style "bg=default"
# ff — fuzzy file finder popup
bind f display-popup -E -d "#{pane_current_path}" -w 80% -h 80% "zsh -i -c ff"

bind-key "s" choose-tree -Zs
bind-key "w" run-shell "sesh connect \"$(
  bash /Users/andrewsmith/dotfiles/.local/bin/session-dir-source default | fzf-tmux -p 80%,70% \
    --delimiter '	' --with-nth '1,2' --nth '1,2' --accept-nth 3 \
    --no-sort --ansi --border-label ' sessions ' --prompt '⚡  ' \
    --header '  ^a dirs ^t tmux ^g configs ^x zoxide ^f home ^d tmux kill' \
    --bind 'tab:down,btab:up' \
    --bind 'ctrl-a:change-prompt(⚡  )+reload(bash /Users/andrewsmith/dotfiles/.local/bin/session-dir-source default)' \
    --bind 'ctrl-t:change-prompt(🪟  )+reload(sesh list -t --icons)' \
    --bind 'ctrl-g:change-prompt(⚙️  )+reload(sesh list -c --icons)' \
    --bind 'ctrl-x:change-prompt(📁  )+reload(sesh list -z --icons)' \
    --bind 'ctrl-f:change-prompt(🏠  )+reload(bash /Users/andrewsmith/dotfiles/.local/bin/session-dir-source home)' \
    --bind 'ctrl-d:execute(tmux kill-session -t {2..})+change-prompt(⚡  )+reload(bash /Users/andrewsmith/dotfiles/.local/bin/session-dir-source default)' \
    --preview-window 'right:55%' \
    --preview 'sesh preview {3}'
)\""

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
