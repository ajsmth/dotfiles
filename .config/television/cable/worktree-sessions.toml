[metadata]
name = "worktree-sessions"
description = "List existing git worktrees for session switching"
requirements = ["git", "bat"]

[source]
command = """git worktree list --porcelain | awk '
/^worktree / {
  path = substr($0, 10)
}
/^branch refs\\/heads\\// {
  branch = substr($0, 19)
  if (path != "" && branch != "") {
    print path "\t" branch
  }
  path = ""
  branch = ""
}'"""
display = "{split:\t:1}    {split:\t:0}"
output = "{split:\t:0}"

[preview]
command = "git -C '{split:\t:0}' --no-pager log --oneline --decorate -n 20 2>/dev/null"

[keybindings]
enter = "actions:switch"
ctrl-y = "actions:copy"

[actions.switch]
description = "Switch to the selected worktree tmux session"
command = '''
ROOT="${DOTFILES_DIR:-$HOME/dotfiles}"
"$ROOT/.local/bin/tmux-switch-worktree-session" '{}' "${TMUX_TARGET_CLIENT:-}"
'''
shell = "bash"
mode = "execute"

[actions.copy]
description = "Copy the worktree path"
command = "printf '%s' '{}'"
mode = "execute"
