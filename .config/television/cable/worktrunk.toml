[metadata]
name = "worktrunk"
description = "Browse existing worktrees and create new ones with Worktrunk"
requirements = ["wt", "git", "sesh"]

[source]
command = """wt list --branches | perl -pe 's/\\e\\[[0-9;]*m//g' | awk '
function trim(s) {
  sub(/^[[:space:]]+/, "", s)
  sub(/[[:space:]]+$/, "", s)
  return s
}

/^ *Branch / || /^○ / || /^$/ {
  next
}

{
  raw = $0
  line = trim(raw)

  if (raw ~ /^[@+^][[:space:]]+/) {
    sub(/^[@+^][[:space:]]+/, "", line)
  }

  branch = line
  sub(/[[:space:]].*$/, "", branch)

  if (branch != "") {
    print branch "\t" raw
  }
}'"""
display = "{split:\t:1}"
output = "{split:\t:0}"

[preview]
command = "git --no-pager log --oneline --decorate -n 20 '{split:\t:0}' 2>/dev/null && echo && git --no-pager diff --stat main...'{split:\t:0}' 2>/dev/null"

[keybindings]
enter = "actions:switch"
ctrl-a = "actions:create"
ctrl-d = [ "actions:delete", "reload_source" ]

[actions.switch]
description = "Switch to selected worktree and its tmux session"
command = "wt switch --no-cd -x 'sesh connect --switch {{ worktree_path }}' '{split:\t:0}'"
mode = "execute"

[actions.create]
description = "Create a new worktree branch with an interactive terminal prompt"
command = "${HOME}/.local/bin/wt-create-session"
mode = "execute"

[actions.delete]
description = "Remove the selected worktree with Worktrunk's safe defaults"
command = "wt remove --foreground '{split:\t:0}'"
mode = "execute"
