[metadata]
name = "worktrunk"
description = "Browse existing worktrees and create new ones with Worktrunk"
requirements = ["wt", "git", "sesh"]

[source]
command = "~/dotfiles/scripts/tmux-worktrunk-session.sh list"
display = "{split:\t:1} {split:\t:0}  {split:\t:2}  {split:\t:4}"

[preview]
command = "git -C '{split:\t:2}' status --short --branch --ahead-behind --show-stash 2>/dev/null && echo && git -C '{split:\t:2}' --no-pager log --oneline --decorate -n 20 2>/dev/null"

[keybindings]
enter = "actions:switch"
ctrl-a = "actions:create"
ctrl-d = [ "actions:delete", "reload_source" ]

[actions.switch]
description = "Switch to selected worktree and its tmux session"
command = "~/dotfiles/scripts/tmux-worktrunk-session.sh switch '{split:\t:0}'"
mode = "execute"

[actions.create]
description = "Prompt for a new branch name, create a worktree, and switch"
command = "~/dotfiles/scripts/tmux-worktrunk-session.sh create-prompt"
mode = "execute"

[actions.delete]
description = "Remove the selected worktree with Worktrunk's safe defaults"
command = "~/dotfiles/scripts/tmux-worktrunk-session.sh delete '{split:\t:0}'"
mode = "execute"
